name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ─── 1. Checkout ───
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js + pnpm ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── 3. Quality gates ───
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # ─── 4. Binary artifact scan ───
      - name: Scan for binary artifacts
        run: |
          echo "Scanning for prohibited binary files..."
          FOUND=$(find . -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.obb' \) -not -path './node_modules/*' -not -path './.git/*')
          if [ -n "$FOUND" ]; then
            echo "::error::Prohibited binary files found in repository:"
            echo "$FOUND"
            exit 1
          fi
          echo "No prohibited binaries found."

      # ─── 5. Build ───
      - name: Build
        run: pnpm build

      # ─── 6. Asset budget check ───
      - name: Check asset budget
        run: |
          SIZE_KB=$(du -sk dist/ | cut -f1)
          SIZE_MB=$((SIZE_KB / 1024))
          echo "dist/ size: ${SIZE_MB} MB (${SIZE_KB} KB)"

          if [ "$SIZE_MB" -ge 40 ]; then
            echo "::error::Asset budget exceeded: dist/ is ${SIZE_MB} MB (limit: 40 MB)"
            exit 1
          fi

          if [ "$SIZE_MB" -ge 25 ]; then
            echo "::warning::Asset budget warning: dist/ is ${SIZE_MB} MB (warn threshold: 25 MB)"
          fi

          echo "Asset budget OK."

      # ─── 7. Deploy ───
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
